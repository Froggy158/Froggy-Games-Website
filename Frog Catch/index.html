<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐸 Frog Catch</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="gameWrapper">
  <canvas id="gameCanvas"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-score">
      <div id="hudScore">SCORE: 0</div>
      <div id="hudHigh">BEST: 0</div>
    </div>
    <div id="hudLives" class="hud-lives">🐸🐸🐸</div>
  </div>

  <!-- Home Button -->
  <button id="homeBtn" onclick="window.location.href='../index.html'">🏠 Home</button>

  <!-- Mobile Buttons -->
  <div id="mobileControls">
    <button class="mob-btn" id="btnLeft">◀</button>
    <button class="mob-btn" id="btnRight">▶</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
