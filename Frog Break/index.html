<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>🐸 Frog Breakout</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div id="gb">
    <div id="hdr">
      <h1>🐸 Frog Breakout</h1>
      <div id="sp">
        <div class="sb"><div class="sl">Score</div><div class="sv" id="sc">0</div></div>
        <div class="sb"><div class="sl">Best</div><div class="sv" id="bst">0</div></div>
        <div class="sb"><div class="sl">Lives</div><div class="sv" id="lv">🐸🐸🐸</div></div>
      </div>
    </div>

    <div id="cw">
      <canvas id="c" width="420" height="520"></canvas>
      <div id="ov">
        <div style="font-size:3rem">🐸</div>
        <h2 id="ov-ti">Frog Breakout!</h2>
        <p id="ov-su">Bounce the fly off your frog paddle<br>and smash all the lily pads!</p>
        <div id="rb">
          <div id="rs"></div>
          <div id="rb2"></div>
        </div>
        <button id="pb">🐸 Start Hoppin'!</button>
        <p id="hint">Mouse · Touch · ← → Arrow Keys</p>
      </div>
    </div>

    <div id="mc">
      <button class="mb" id="bl">◀</button>
      <button class="mb" id="br">▶</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
