<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>🐸 Frog Memory</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: radial-gradient(ellipse at top, #0d3320 0%, #060f08 70%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Fredoka One', cursive;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  -webkit-user-drag: none;
}

#game-wrap {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  width: 100%;
  max-width: 420px;
  padding: 16px 12px 24px;
}

#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
}

h1 {
  font-size: 1.9rem;
  color: #52b788;
  text-shadow: 0 3px 0 #1b4332, 0 0 24px rgba(82,183,136,0.45);
  letter-spacing: 1px;
}

#score-panel { display: flex; gap: 10px; }

.sbox {
  background: rgba(82,183,136,0.1);
  border: 2px solid #52b788;
  border-radius: 12px;
  padding: 4px 14px;
  text-align: center;
  min-width: 64px;
}

.slabel {
  font-family: 'Nunito', sans-serif;
  font-size: 0.58rem;
  color: #74c69d;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 900;
}

.sval {
  font-size: 1.4rem;
  color: #fff;
  line-height: 1.2;
}

#status-bar {
  background: rgba(82,183,136,0.08);
  border: 1.5px solid rgba(82,183,136,0.3);
  border-radius: 50px;
  padding: 8px 24px;
  width: 100%;
  text-align: center;
}

#status-text {
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  color: #b7e4c7;
  font-weight: 900;
  letter-spacing: 0.3px;
}

#pad-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  width: 100%;
}

.pad {
  aspect-ratio: 1;
  border-radius: 50%;
  border: 4px solid rgba(82,183,136,0.3);
  background: radial-gradient(circle at 35% 35%, #1b4332, #0d2218);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.08s, border-color 0.08s;
  position: relative;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  box-shadow: inset 0 -4px 12px rgba(0,0,0,0.4), 0 4px 20px rgba(0,0,0,0.4);
}

#pad-0 { border-color: rgba(74,222,128,0.35);  }
#pad-1 { border-color: rgba(251,191,36,0.35);  }
#pad-2 { border-color: rgba(96,165,250,0.35);  }
#pad-3 { border-color: rgba(251,113,133,0.35); }

.pad::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background:
    radial-gradient(circle at 70% 70%, rgba(82,183,136,0.08) 0%, transparent 60%),
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.06) 0%, transparent 40%);
  pointer-events: none;
}

.pad::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 50%;
  transform: translateX(-50%);
  width: 18%;
  height: 18%;
  border-radius: 50%;
  background: radial-gradient(circle, #0d2218 60%, transparent 100%);
  pointer-events: none;
}

.pad-emoji {
  font-size: 2.8rem;
  line-height: 1;
  z-index: 1;
  transition: transform 0.12s;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
}

.pad.lit-0 {
  background: radial-gradient(circle at 35% 35%, #16a34a, #14532d);
  border-color: #4ade80;
  box-shadow: 0 0 30px rgba(74,222,128,0.7), inset 0 0 20px rgba(74,222,128,0.2);
  transform: scale(1.06);
}
.pad.lit-1 {
  background: radial-gradient(circle at 35% 35%, #d97706, #92400e);
  border-color: #fbbf24;
  box-shadow: 0 0 30px rgba(251,191,36,0.7), inset 0 0 20px rgba(251,191,36,0.2);
  transform: scale(1.06);
}
.pad.lit-2 {
  background: radial-gradient(circle at 35% 35%, #2563eb, #1e3a8a);
  border-color: #60a5fa;
  box-shadow: 0 0 30px rgba(96,165,250,0.7), inset 0 0 20px rgba(96,165,250,0.2);
  transform: scale(1.06);
}
.pad.lit-3 {
  background: radial-gradient(circle at 35% 35%, #e11d48, #881337);
  border-color: #fb7185;
  box-shadow: 0 0 30px rgba(251,113,133,0.7), inset 0 0 20px rgba(251,113,133,0.2);
  transform: scale(1.06);
}

.pad.wrong {
  background: radial-gradient(circle at 35% 35%, #7f1d1d, #450a0a) !important;
  border-color: #ef4444 !important;
  box-shadow: 0 0 30px rgba(239,68,68,0.8) !important;
  transform: scale(0.95) !important;
}

.pad.disabled {
  pointer-events: none;
  opacity: 0.75;
}

#frog-display {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  min-height: 72px;
}

#frog-emoji {
  font-size: 3rem;
  line-height: 1;
  transition: transform 0.15s;
  filter: drop-shadow(0 3px 8px rgba(0,0,0,0.4));
}

#frog-emoji.hop    { transform: translateY(-12px) scale(1.15); }
#frog-emoji.wobble { animation: wobble 0.4s ease; }

@keyframes wobble {
  0%   { transform: rotate(0deg);   }
  20%  { transform: rotate(-14deg); }
  40%  { transform: rotate(14deg);  }
  60%  { transform: rotate(-8deg);  }
  80%  { transform: rotate(8deg);   }
  100% { transform: rotate(0deg);   }
}

#frog-msg {
  font-family: 'Nunito', sans-serif;
  font-size: 0.95rem;
  color: #74c69d;
  font-weight: 900;
  text-align: center;
  min-height: 22px;
}

#progress-bar {
  display: flex;
  justify-content: center;
  min-height: 16px;
}

#progress-dots {
  display: flex;
  gap: 6px;
  align-items: center;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(82,183,136,0.25);
  border: 1.5px solid rgba(82,183,136,0.4);
  transition: background 0.2s, transform 0.15s;
}

.dot.done   { background: #52b788; border-color: #4ade80; transform: scale(1.2); }
.dot.active { background: #ffd166; border-color: #fbbf24; transform: scale(1.3); }

#overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(6,15,8,0.92);
  z-index: 30;
  gap: 12px;
  padding: 28px 24px;
  backdrop-filter: blur(5px);
  border-radius: 16px;
}

#ov-emoji { font-size: 3.6rem; line-height: 1; }

#ov-title {
  font-size: 2.3rem;
  color: #52b788;
  text-shadow: 0 3px 0 #1b4332;
  text-align: center;
}

#ov-sub {
  font-family: 'Nunito', sans-serif;
  font-size: 0.9rem;
  color: #b7e4c7;
  text-align: center;
  line-height: 1.6;
  font-weight: 700;
}

#result-box {
  display: none;
  flex-direction: column;
  align-items: center;
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(82,183,136,0.35);
  border-radius: 14px;
  padding: 10px 32px;
  gap: 3px;
  margin: 4px 0;
}

#res-round { font-size: 1.8rem; color: #ffd166; }

#res-best {
  font-family: 'Nunito', sans-serif;
  font-size: 0.85rem;
  color: #b7e4c7;
  font-weight: 700;
}

#play-btn {
  background: #52b788;
  color: #1b4332;
  border: none;
  border-radius: 50px;
  padding: 13px 40px;
  font-family: 'Fredoka One', cursive;
  font-size: 1.35rem;
  cursor: pointer;
  box-shadow: 0 6px 0 #2d6a4f, 0 10px 24px rgba(0,0,0,0.35);
  transition: transform 0.1s, box-shadow 0.1s;
  margin-top: 4px;
  -webkit-tap-highlight-color: transparent;
}

#play-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #2d6a4f; }
  </style>
</head>
<body>

  <div id="game-wrap">

    <div id="header">
      <h1>🐸 Frog Memory</h1>
      <div id="score-panel">
        <div class="sbox">
          <div class="slabel">Round</div>
          <div class="sval" id="round-el">1</div>
        </div>
        <div class="sbox">
          <div class="slabel">Best</div>
          <div class="sval" id="best-el">0</div>
        </div>
      </div>
    </div>

    <div id="status-bar">
      <span id="status-text">Watch the sequence!</span>
    </div>

    <div id="pad-grid">
      <button class="pad" id="pad-0" data-index="0"><span class="pad-emoji" id="emoji-0"></span></button>
      <button class="pad" id="pad-1" data-index="1"><span class="pad-emoji" id="emoji-1"></span></button>
      <button class="pad" id="pad-2" data-index="2"><span class="pad-emoji" id="emoji-2"></span></button>
      <button class="pad" id="pad-3" data-index="3"><span class="pad-emoji" id="emoji-3"></span></button>
    </div>

    <div id="frog-display">
      <span id="frog-emoji">🐸</span>
      <span id="frog-msg"></span>
    </div>

    <div id="progress-bar">
      <div id="progress-dots"></div>
    </div>

    <div id="overlay">
      <div id="ov-emoji">🐸</div>
      <h2 id="ov-title">Frog Memory</h2>
      <p id="ov-sub">Watch the lily pads light up,<br>then repeat the sequence!</p>
      <div id="result-box">
        <div id="res-round"></div>
        <div id="res-best"></div>
      </div>
      <button id="play-btn">🐸 Start!</button>
    </div>

  </div>

  <script>
'use strict';

const roundEl    = document.getElementById('round-el');
const bestEl     = document.getElementById('best-el');
const statusText = document.getElementById('status-text');
const frogEmoji  = document.getElementById('frog-emoji');
const frogMsg    = document.getElementById('frog-msg');
const dotsEl     = document.getElementById('progress-dots');
const overlay    = document.getElementById('overlay');
const ovEmoji    = document.getElementById('ov-emoji');
const ovTitle    = document.getElementById('ov-title');
const ovSub      = document.getElementById('ov-sub');
const resultBx   = document.getElementById('result-box');
const resRound   = document.getElementById('res-round');
const resBest    = document.getElementById('res-best');
const playBtn    = document.getElementById('play-btn');

const pads = [0,1,2,3].map(i => document.getElementById('pad-' + i));

const PAD_CONFIG = [
  { emoji: '🍄', label: 'Mushroom'  },
  { emoji: '⭐', label: 'Star'      },
  { emoji: '🌸', label: 'Flower'    },
  { emoji: '🦋', label: 'Butterfly' },
];

PAD_CONFIG.forEach((cfg, i) => {
  document.getElementById('emoji-' + i).textContent = cfg.emoji;
});

const SHOW_SPEED_BASE = 700;
const SHOW_SPEED_MIN  = 280;
const SHOW_LIT_MS     = 520;
const PAUSE_BETWEEN   = 200;
const CORRECT_LIT_MS  = 300;
const WRONG_LIT_MS    = 500;

const CORRECT_MSGS = ['Nice!', 'Ribbit!', 'Yes!', '🎉', "Hoppin'!", 'Croaksome!'];
const WRONG_MSGS   = ['Oops!', 'Splat!', 'Ribbit?', 'Wrong pad!'];
const ROUND_MSGS   = ['Watch closely...', 'Pay attention!', 'Here we go!', 'Remember this!', 'Getting tricky...'];

let sequence    = [];
let playerPos   = 0;
let round       = 0;
let best        = parseInt(localStorage.getItem('frogMemoryBest') || '0');
let gameState   = 'idle';
let isAnimating = false;

bestEl.textContent = best;

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function setStatus(text, color) {
  statusText.textContent = text;
  statusText.style.color = color || '#b7e4c7';
}

function setFrog(emoji, msg, hop, wobble) {
  frogEmoji.textContent = emoji;
  frogMsg.textContent   = msg || '';
  frogEmoji.classList.toggle('hop',    !!hop);
  frogEmoji.classList.toggle('wobble', !!wobble);
}

function getRoundSpeed() {
  return Math.max(SHOW_SPEED_MIN, SHOW_SPEED_BASE - (round - 1) * 30);
}

function buildDots() {
  dotsEl.innerHTML = '';
  for (let i = 0; i < sequence.length; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    if (i < playerPos) dot.classList.add('done');
    if (i === playerPos && gameState === 'player') dot.classList.add('active');
    dotsEl.appendChild(dot);
  }
}

async function lightPad(index, durationMs, className) {
  const pad = pads[index];
  const cls = className || ('lit-' + index);
  pad.classList.add(cls);
  document.getElementById('emoji-' + index).style.transform = 'scale(1.15)';
  await sleep(durationMs);
  pad.classList.remove(cls);
  document.getElementById('emoji-' + index).style.transform = '';
}

async function showSequence() {
  gameState   = 'showing';
  isAnimating = true;
  pads.forEach(p => p.classList.add('disabled'));
  setStatus(ROUND_MSGS[Math.min(round - 1, ROUND_MSGS.length - 1)], '#ffd166');
  setFrog('🐸', 'Watch!');
  buildDots();
  await sleep(600);
  for (let i = 0; i < sequence.length; i++) {
    const idx = sequence[i];
    setFrog('🐸', PAD_CONFIG[idx].emoji, true);
    await lightPad(idx, SHOW_LIT_MS);
    setFrog('🐸', '');
    await sleep(PAUSE_BETWEEN);
  }
  gameState   = 'player';
  isAnimating = false;
  playerPos   = 0;
  pads.forEach(p => p.classList.remove('disabled'));
  setStatus('Your turn! Repeat the sequence.', '#74c69d');
  setFrog('🐸', 'Go!');
  buildDots();
}

async function onPadTap(index) {
  if (gameState !== 'player' || isAnimating) return;
  isAnimating = true;
  pads.forEach(p => p.classList.add('disabled'));
  const expected = sequence[playerPos];
  if (index === expected) {
    await lightPad(index, CORRECT_LIT_MS);
    setFrog('🐸', CORRECT_MSGS[Math.floor(Math.random() * CORRECT_MSGS.length)], true);
    playerPos++;
    buildDots();
    await sleep(120);
    if (playerPos === sequence.length) {
      await sleep(300);
      setFrog('🎉', 'Perfect!');
      setStatus('Ribbit! You got it! 🎉', '#ffd166');
      await sleep(800);
      await nextRound();
    } else {
      pads.forEach(p => p.classList.remove('disabled'));
      isAnimating = false;
      setStatus(playerPos + ' / ' + sequence.length + ' — keep going!', '#74c69d');
    }
  } else {
    await lightPad(index, WRONG_LIT_MS, 'wrong');
    lightPad(expected, WRONG_LIT_MS);
    setFrog('😵', WRONG_MSGS[Math.floor(Math.random() * WRONG_MSGS.length)], false, true);
    setStatus('Wrong pad! Game over.', '#ef4444');
    await sleep(900);
    die();
  }
}

async function nextRound() {
  round++;
  roundEl.textContent = round;
  sequence.push(Math.floor(Math.random() * 4));
  playerPos = 0;
  await showSequence();
}

function die() {
  gameState = 'dead';
  const achieved = round - 1;
  if (achieved > best) {
    best = achieved;
    localStorage.setItem('frogMemoryBest', best);
    bestEl.textContent = best;
  }
  ovEmoji.textContent = achieved >= 8 ? '🏆' : achieved >= 4 ? '🎖️' : '💀';
  ovTitle.textContent = achieved >= 8 ? 'Memory Master!' : achieved >= 4 ? 'Nice Memory!' : 'Forgot!';
  ovSub.textContent   = 'You remembered ' + achieved + ' round' + (achieved !== 1 ? 's' : '') + '!';
  resRound.textContent = '🐸 ' + achieved + ' round' + (achieved !== 1 ? 's' : '') + ' completed';
  resBest.textContent  = 'Best: ' + best + ' rounds';
  resultBx.style.display = 'flex';
  playBtn.textContent = '🐸 Play Again!';
  overlay.style.display = 'flex';
}

async function startGame() {
  overlay.style.display  = 'none';
  resultBx.style.display = 'none';
  sequence    = [];
  playerPos   = 0;
  round       = 0;
  isAnimating = false;
  setFrog('🐸', '');
  setStatus('Get ready!', '#b7e4c7');
  dotsEl.innerHTML = '';
  pads.forEach(p => { p.className = 'pad'; });
  await sleep(400);
  await nextRound();
}

pads.forEach((pad, i) => {
  pad.addEventListener('click', () => onPadTap(i));
  pad.addEventListener('touchstart', e => { e.preventDefault(); onPadTap(i); }, { passive: false });
});

playBtn.addEventListener('click', startGame);

(function boot() {
  bestEl.textContent     = best;
  roundEl.textContent    = '1';
  ovEmoji.textContent    = '🐸';
  ovTitle.textContent    = 'Frog Memory';
  ovSub.textContent      = 'Watch the lily pads light up, then repeat the sequence!';
  resultBx.style.display = 'none';
  playBtn.textContent    = '🐸 Start!';
  overlay.style.display  = 'flex';
  setFrog('🐸', 'Ready?');
  setStatus('Press Start to play!', '#74c69d');
})();
  </script>
</body>
</html>
