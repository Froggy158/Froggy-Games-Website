<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Frog Bros</title>
<style>
  /* ===== RESET & BASE ===== */
  * {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
  }
  body {
    background: #0a1a0a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    touch-action: none;
  }
  img { -webkit-user-drag: none; user-drag: none; pointer-events: none; }

  /* ===== HOME BUTTON ===== */
  .btn-home {
    position: fixed; top: 10px; left: 10px; z-index: 999;
    background: #1a3a1a; color: #4dff4d;
    border: 2px solid #4dff4d;
    padding: 6px 12px; font-size: 14px;
    font-family: 'Courier New', monospace;
    cursor: pointer; letter-spacing: 1px;
    transition: none;
  }
  .btn-home:active { background: #4dff4d; color: #0a1a0a; }

  /* ===== GAME WRAPPER ===== */
  #game-wrapper {
    position: relative;
    width: 100%;
    display: flex; flex-direction: column;
    align-items: center;
  }
  #gameCanvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #000;
    border: 3px solid #4dff4d;
    box-shadow: 0 0 30px #4dff4d55;
    max-width: 100vw;
  }

  /* ===== MOBILE CONTROLS ===== */
  #mobile-controls {
    display: none;
    width: 100%;
    max-width: 480px;
    padding: 10px 20px;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .ctrl-group { display: flex; gap: 8px; }
  .ctrl-btn {
    width: 64px; height: 64px;
    background: rgba(77,255,77,0.15);
    border: 3px solid #4dff4d;
    border-radius: 8px;
    color: #4dff4d;
    font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    active-background: rgba(77,255,77,0.4);
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active { background: rgba(77,255,77,0.4); }
  .ctrl-btn.jump-btn { width: 72px; height: 72px; font-size: 26px; }

  @media (max-width: 520px) {
    #mobile-controls { display: flex; }
  }
  @media (pointer: coarse) {
    #mobile-controls { display: flex; }
  }

  /* ===== PIXELATED SCANLINE OVERLAY ===== */
  #scanlines {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent, transparent 2px,
      rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
    );
    z-index: 10;
  }
</style>
</head>
<body>

<button class="btn-home" onclick="window.location.href='../index.html'">🏠 Home</button>

<div id="game-wrapper">
  <div style="position:relative">
    <canvas id="gameCanvas"></canvas>
    <div id="scanlines"></div>
  </div>
  <div id="mobile-controls">
    <div class="ctrl-group">
      <div class="ctrl-btn" id="btn-left">◀</div>
      <div class="ctrl-btn" id="btn-right">▶</div>
    </div>
    <div class="ctrl-btn jump-btn" id="btn-jump">▲</div>
  </div>
</div>

<script>
// =============================================
//  FROG BROS - Retro Platformer
//  Single-file HTML5 Canvas game
// =============================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ===== RESIZE =====
function resize() {
  const maxW = Math.min(window.innerWidth, 480);
  const scale = maxW / 480;
  canvas.width = 480;
  canvas.height = 320;
  canvas.style.width = maxW + 'px';
  canvas.style.height = (320 * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ===== CONSTANTS =====
const TILE = 16;
const GRAVITY = 0.45;
const JUMP_FORCE = -9.5;
const JUMP_HOLD = -0.3;
const MAX_FALL = 12;
const WALK_SPEED = 2.8;
const FRICTION = 0.82;

// ===== GAME STATE =====
let state = 'START'; // START | PLAYING | PAUSED | DEAD | WIN | GAMEOVER
let score = 0;
let lives = 3;
let level = 0;
let frameCount = 0;
let shakeTimer = 0;

// ===== INPUT =====
const keys = {};
const prevKeys = {};
const touchBtns = { left: false, right: false, jump: false };
let jumpHeld = false;
let jumpHeldFrames = 0;

document.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  keys[e.key] = true;
});
document.addEventListener('keyup', e => { keys[e.key] = false; });
document.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// Tap canvas to start/retry on mobile
canvas.addEventListener('touchend', e => {
  if (state === 'START' || state === 'GAMEOVER' || state === 'WIN') {
    score = 0; lives = 3; level = 0;
    initLevel(level);
    state = 'PLAYING';
  }
});

// Mobile buttons
function setupMobileBtn(id, prop) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('touchstart', e => { e.stopPropagation(); touchBtns[prop] = true; }, { passive: false });
  el.addEventListener('touchend', e => { e.stopPropagation(); touchBtns[prop] = false; }, { passive: false });
  el.addEventListener('touchcancel', e => { e.stopPropagation(); touchBtns[prop] = false; }, { passive: false });
  el.addEventListener('mousedown', e => { touchBtns[prop] = true; });
  el.addEventListener('mouseup', e => { touchBtns[prop] = false; });
}
setupMobileBtn('btn-left', 'left');
setupMobileBtn('btn-right', 'right');
setupMobileBtn('btn-jump', 'jump');

function isLeft()  { return keys['ArrowLeft']  || touchBtns.left; }
function isRight() { return keys['ArrowRight'] || touchBtns.right; }
function isJump()  { return keys[' '] || keys['ArrowUp'] || touchBtns.jump; }
function justPressed(k) { return (keys[k] && !prevKeys[k]); }

// ===== WEB AUDIO =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}
function playBeep(freq, dur, type='square', vol=0.15) {
  try {
    const ac = getAudio();
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.start(); o.stop(ac.currentTime + dur);
  } catch(e) {}
}
function sfxJump()    { playBeep(400, 0.12, 'square', 0.12); playBeep(600, 0.08, 'square', 0.08); }
function sfxCoin()    { playBeep(880, 0.05, 'sine', 0.1); setTimeout(()=>playBeep(1200,0.08,'sine',0.1), 60); }
function sfxStomp()   { playBeep(200, 0.15, 'sawtooth', 0.2); }
function sfxHurt()    { playBeep(150, 0.3, 'sawtooth', 0.25); }
function sfxWin()     { [523,659,784,1046].forEach((f,i) => setTimeout(()=>playBeep(f,0.2,'sine',0.15),i*120)); }
function sfxGameOver(){ [300,250,200,150].forEach((f,i) => setTimeout(()=>playBeep(f,0.25,'sawtooth',0.2),i*150)); }

// ===== PARTICLE SYSTEM =====
let particles = [];
function spawnParticles(x, y, color, count=6) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const speed = 1.5 + Math.random() * 2;
    particles.push({
      x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed - 1,
      life: 30 + Math.random()*20, maxLife: 50,
      color, size: 2 + Math.random()*2
    });
  }
}
function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.1;
    p.life--;
  }
}
function drawParticles(camX) {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - camX, p.y, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ===== TILE TYPES =====
// 0=air, 1=ground, 2=platform, 3=pipe-top, 4=pipe-body, 5=log-top, 6=log-body, 7=flag-pole, 8=castle

// ===== COLORS =====

// ===== LEVEL DATA =====
// Each level: map rows (each 'X' = ground, '.' = air, 'P'=platform, 'p'=pipe, 'l'=log, 'f'=fly, 'e'=enemy(bug), 's'=enemy(snake), 'F'=flag, 'C'=castle)
// Map stored as string rows, parsed into tile/entity arrays

const LEVEL_DATA = [

      '................................................................................',// 8

      '................................................................................',//11
      '............................................................................F...',//12 h=192
      '..........................................................................PPPP..',//13

      'XXXX.......XXXX........XXXX.......XXXX.......XXXX........XXXX.......XXXXXXXXXX..',//15
      'XXXX.......XXXX........XXXX.......XXXX.......XXXX........XXXX.......XXXXXXXXXX..',//16
      'XXXX.......XXXX........XXXX.......XXXX.......XXXX........XXXX.......XXXXXXXXXX..',//17
      'XXXX.......XXXX........XXXX.......XXXX.......XXXX........XXXX.......XXXXXXXXXX..',//18
      'XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX',//19
    ],
    entities: [
      // flies: {type:'fly', tx, ty}
      {type:'fly', tx:5, ty:13}, {type:'fly', tx:7, ty:13}, {type:'fly', tx:9, ty:13},
      {type:'fly', tx:15, ty:13},{type:'fly', tx:17, ty:13},
      {type:'fly', tx:22, ty:6}, {type:'fly', tx:24, ty:6},
      {type:'fly', tx:30, ty:6}, {type:'fly', tx:32, ty:6},
      {type:'fly', tx:40, ty:6},{type:'fly', tx:42, ty:6},{type:'fly', tx:44, ty:6},
      {type:'fly', tx:51, ty:9},{type:'fly', tx:53, ty:9},
      {type:'fly', tx:60, ty:9},{type:'fly', tx:62, ty:9},
      // enemies
      {type:'bug', tx:15, ty:13}, {type:'bug', tx:25, ty:13},
      {type:'bug', tx:38, ty:13}, {type:'snake', tx:52, ty:13},
      {type:'bug', tx:65, ty:13},
    ],
    playerStart: { tx:1, ty:13 },
    flagPos: { tx:73, ty:11 }
  },
  // LEVEL 2 - More complex
  {
    bgColor1: '#1a2a3a',
    bgColor2: '#0d1525',
    hills: [[30,205,70,35,'#1a3050'],[220,200,90,40,'#152840'],[420,208,80,32,'#1a3050']],
    width: 90,
    map: [
      '...................................................................................',// 0
      '...................................................................................',// 1
      '...................................................................................',// 2
      '...................................................................................',// 3

      '........PPPP.............PPP...........PPPP.........PPP.............................',// 5
      '...................................................................................',// 6
      '.PPPP...........PPPP...........PPP..............PPPP............PPPP................',// 7
      '...................................................................................',// 8
      '...................................................................................',// 9
      '.....PPPP.............PPPP.............PPP..............PPPP.................F.....',//10
      '...................................................................................',//11
      '..............................................................................PPPPP',//12
      'XXXXX......XXXXX......XXXXX......XXXXX......XXXXX......XXXXX......XXXXXXXXXXXXXXXXXXX',//13
      'XXXXX......XXXXX......XXXXX......XXXXX......XXXXX......XXXXX......XXXXXXXXXXXXXXXXXXX',//14
      'XXXXX......XXXXX......XXXXX......XXXXX......XXXXX......XXXXX......XXXXXXXXXXXXXXXXXXX',//15
      'XXXXX......XXXXX......XXXXX......XXXXX......XXXXX......XXXXX......XXXXXXXXXXXXXXXXXXX',//16
      'XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX',//17
    ],
    entities: [
      {type:'fly',tx:3,ty:12},{type:'fly',tx:5,ty:12},{type:'fly',tx:8,ty:12},
      {type:'fly',tx:12,ty:4},{type:'fly',tx:14,ty:4},{type:'fly',tx:16,ty:4},
      {type:'fly',tx:22,ty:4},{type:'fly',tx:24,ty:4},
      {type:'fly',tx:30,ty:4},{type:'fly',tx:32,ty:4},{type:'fly',tx:34,ty:4},
      {type:'fly',tx:42,ty:4},{type:'fly',tx:44,ty:4},
      {type:'fly',tx:52,ty:4},{type:'fly',tx:54,ty:4},{type:'fly',tx:56,ty:4},
      {type:'fly',tx:62,ty:4},{type:'fly',tx:64,ty:4},
      // enemies - more aggressive
      {type:'snake',tx:10,ty:12},{type:'bug',tx:18,ty:12},{type:'snake',tx:28,ty:12},
      {type:'bug',tx:38,ty:12},{type:'snake',tx:48,ty:12},{type:'bug',tx:58,ty:12},

    ],

];

// ===== LEVEL PARSER =====
function parseLevel(lvlData) {
  const rows = lvlData.map;
  const numRows = rows.length;
  const numCols = lvlData.width;
  const tiles = [];

  for (let r = 0; r < numRows; r++) {
    tiles[r] = [];
    for (let c = 0; c < numCols; c++) {
      const ch = (rows[r] && rows[r][c]) || '.';
      if (ch === 'X') tiles[r][c] = T.GROUND;
      else if (ch === 'P') tiles[r][c] = T.PLATFORM;
      else tiles[r][c] = T.AIR;
    }
  }
  return tiles;
}

// ===== PLAYER =====
let player = {};
function resetPlayer(lvl) {
  const ps = LEVEL_DATA[lvl].playerStart;
  player = {
    x: ps.tx * TILE + 2, y: ps.ty * TILE - 20,
    w: 14, h: 16,
    vx: 0, vy: 0,
    onGround: false,
    facing: 1, // 1=right, -1=left
    jumpHeld: false,
    jumpHeldFrames: 0,
    animFrame: 0,
    animTimer: 0,
    state: 'idle', // idle|walk|jump|fall
    invincible: 0,
    superFrog: false,
    superTimer: 0,
    speedBoost: false,
    speedTimer: 0,
    tongueActive: false,
    tongueTimer: 0,
  };
}

// ===== ENEMIES =====
let enemies = [];
function spawnEnemies(lvl) {
  enemies = [];
  for (const e of LEVEL_DATA[lvl].entities) {
    if (e.type === 'bug' || e.type === 'snake') {
      enemies.push({
        type: e.type,
        x: e.tx * TILE, y: e.ty * TILE - 14,
        w: 14, h: 14,
        vx: e.type === 'snake' ? -1.2 : -1.0,
        vy: 0,
        onGround: false,
        alive: true,
        stomped: false,
        stompTimer: 0,
        animFrame: 0,
        animTimer: 0,
        patrolMin: (e.tx - 5) * TILE,
        patrolMax: (e.tx + 5) * TILE,
      });
    }
  }
}

// ===== FLIES (collectibles) =====
let flies = [];
function spawnFlies(lvl) {
  flies = [];
  for (const e of LEVEL_DATA[lvl].entities) {
    if (e.type === 'fly') {
      flies.push({
        x: e.tx * TILE + 4, y: e.ty * TILE - 10,
        w: 8, h: 8,
        collected: false,
        bobTimer: Math.random() * Math.PI * 2,
      });
    }
  }
}

// ===== FLAG =====
let flag = {};
function spawnFlag(lvl) {
  const fp = LEVEL_DATA[lvl].flagPos;
  flag = { x: fp.tx * TILE, y: fp.ty * TILE - 32, w: 8, h: 40, reached: false };
}

// ===== MOVING PLATFORMS =====
let movingPlatforms = []; // optional

// ===== TILES =====
let tiles = [];
let mapRows = 0;
let mapCols = 0;

// ===== CAMERA =====
let camX = 0;
let camY = 0;

// ===== INIT LEVEL =====
function initLevel(lvl) {
  const lvlData = LEVEL_DATA[lvl];
  tiles = parseLevel(lvlData);
  mapRows = tiles.length;
  mapCols = lvlData.width;
  resetPlayer(lvl);
  spawnEnemies(lvl);
  spawnFlies(lvl);
  spawnFlag(lvl);
  movingPlatforms = [];
  camX = 0;
  camY = 0;
  particles = [];
  frameCount = 0;
  shakeTimer = 0;
}

// ===== COLLISION HELPERS =====
function getTile(col, row) {
  if (row < 0 || row >= mapRows || col < 0 || col >= mapCols) return T.AIR;
  return tiles[row][col];
}
function isSolid(t) { return t === T.GROUND || t === T.PLATFORM || t === T.PIPE_T || t === T.LOG_T; }
function isPlatformTop(t) { return t === T.PLATFORM || t === T.LOG_T; }

// Swept AABB - resolve entity against tiles
function resolveEntity(ent, tiles) {
  ent.onGround = false;
  // Apply gravity
  ent.vy += GRAVITY;
  if (ent.vy > MAX_FALL) ent.vy = MAX_FALL;

  // Move X
  ent.x += ent.vx;
  resolveX(ent);

  // Move Y
  ent.y += ent.vy;
  resolveY(ent);
}

function resolveX(ent) {
  const left = Math.floor(ent.x / TILE);
  const right = Math.floor((ent.x + ent.w - 1) / TILE);
  const top = Math.floor(ent.y / TILE);
  const bot = Math.floor((ent.y + ent.h - 1) / TILE);
  for (let r = top; r <= bot; r++) {
    if (isSolid(getTile(left, r)) && !isPlatformTop(getTile(left, r))) {
      ent.x = (left + 1) * TILE;
      ent.vx = 0;
    }
    if (isSolid(getTile(right, r)) && !isPlatformTop(getTile(right, r))) {
      ent.x = right * TILE - ent.w;
      ent.vx = 0;
    }
  }
}

function resolveY(ent) {
  const left = Math.floor(ent.x / TILE);
  const right = Math.floor((ent.x + ent.w - 1) / TILE);
  const top = Math.floor(ent.y / TILE);
  const bot = Math.floor((ent.y + ent.h - 1) / TILE);
  for (let c = left; c <= right; c++) {
    if (ent.vy < 0) {
      const t = getTile(c, top);
      if (isSolid(t) && !isPlatformTop(t)) {
        ent.y = (top + 1) * TILE;
        ent.vy = 0;
      }
    }
    if (ent.vy >= 0) {
      const t = getTile(c, bot);
      if (isSolid(t)) {
        // Platform: only collide from above
        if (isPlatformTop(t)) {
          const prevBot = ent.y + ent.h - ent.vy;
          if (prevBot <= bot * TILE) {
            ent.y = bot * TILE - ent.h;
            ent.vy = 0;
            ent.onGround = true;
          }
        } else {
          ent.y = bot * TILE - ent.h;
          ent.vy = 0;
          ent.onGround = true;
        }
      }
    }
  }
}

function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

// ===== PLAYER UPDATE =====
function updatePlayer() {
  if (player.invincible > 0) player.invincible--;
  if (player.superTimer > 0) { player.superTimer--; if (player.superTimer === 0) player.superFrog = false; }
  if (player.speedTimer > 0) { player.speedTimer--; if (player.speedTimer === 0) player.speedBoost = false; }

  const spd = player.speedBoost ? WALK_SPEED * 1.6 : WALK_SPEED;

  // Horizontal input
  if (isLeft())  { player.vx -= 0.8; player.facing = -1; }
  if (isRight()) { player.vx += 0.8; player.facing =  1; }
  if (!isLeft() && !isRight()) player.vx *= FRICTION;
  player.vx = Math.max(-spd, Math.min(spd, player.vx));

  // Jump input
  const jumpBtn = isJump();
  if (jumpBtn && player.onGround) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
    player.jumpHeld = true;
    player.jumpHeldFrames = 0;
    sfxJump();
  }
  if (jumpBtn && player.jumpHeld && player.jumpHeldFrames < 12) {
    player.vy += JUMP_HOLD;
    player.jumpHeldFrames++;
  }
  if (!jumpBtn) { player.jumpHeld = false; player.jumpHeldFrames = 0; }

  resolveEntity(player, tiles);

  // Determine anim state
  if (!player.onGround) {
    player.state = player.vy < 0 ? 'jump' : 'fall';
  } else if (Math.abs(player.vx) > 0.3) {
    player.state = 'walk';
  } else {
    player.state = 'idle';
  }

  // Animate walk
  player.animTimer++;
  if (player.animTimer > 8) { player.animTimer = 0; player.animFrame = (player.animFrame+1)%4; }

  // Camera follow - center player, stop at edges
  const targetX = player.x - canvas.width / 2 + player.w / 2;
  const maxCamX = mapCols * TILE - canvas.width;
  camX += (targetX - camX) * 0.12;
  camX = Math.max(0, Math.min(maxCamX, camX));

  // Fall into pit
  if (player.y > mapRows * TILE + 64) {
    playerHurt(true);
  }
}

function playerHurt(fatal = false) {
  if (player.invincible > 0) return;
  sfxHurt();
  shakeTimer = 20;
  if (player.superFrog && !fatal) {
    player.superFrog = false;
    player.superTimer = 0;
    player.invincible = 90;
    spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ffff00', 8);
    return;
  }
  lives--;
  spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ff4444', 10);
  if (lives <= 0) {
    sfxGameOver();
    state = 'GAMEOVER';
  } else {
    state = 'DEAD';
    setTimeout(() => {
      initLevel(level);
      state = 'PLAYING';
    }, 1200);
  }
}

// ===== ENEMY UPDATE =====
function updateEnemies() {
  for (const e of enemies) {
    if (!e.alive) continue;
    if (e.stomped) {
      e.stompTimer--;
      if (e.stompTimer <= 0) e.alive = false;
      continue;
    }

    // AI patrol
    resolveEntity(e, tiles);
    if (!e.onGround) {} // falling, fine
    if (e.onGround) {
      // Reverse at patrol edge or wall
      if (e.x < e.patrolMin || e.x > e.patrolMax) e.vx *= -1;
      // Check tile ahead for cliff
      const ahead = Math.floor((e.x + (e.vx > 0 ? e.w + 2 : -2)) / TILE);
      const foot = Math.floor((e.y + e.h + 1) / TILE);
      if (getTile(ahead, foot) === T.AIR) e.vx *= -1;
    }

    // Animate
    e.animTimer++;
    if (e.animTimer > 10) { e.animTimer = 0; e.animFrame = (e.animFrame+1)%2; }

    // Check player collision
    if (player.invincible > 0) continue;
    if (!rectOverlap(player, e)) continue;
    // Stomp check: player falling, feet above enemy center
    const playerFeet = player.y + player.h;
    const enemyMid = e.y + e.h / 2;
    if (player.vy > 0.5 && playerFeet < enemyMid + 6) {
      // Stomp!
      e.stomped = true;
      e.stompTimer = 20;
      e.vy = 0;
      player.vy = -5;
      score += e.type === 'snake' ? 200 : 100;
      sfxStomp();
      spawnParticles(e.x + e.w/2, e.y + e.h/2, '#ffaa00', 8);
    } else {
      playerHurt();
    }
  }
}

// ===== FLIES UPDATE =====
function updateFlies() {
  for (const f of flies) {
    if (f.collected) continue;
    f.bobTimer += 0.08;
    if (rectOverlap(player, { x: f.x, y: f.y + Math.sin(f.bobTimer)*3, w: f.w, h: f.h })) {
      f.collected = true;
      score += 50;
      sfxCoin();
      spawnParticles(f.x + f.w/2, f.y + f.h/2, '#88ff44', 6);
    }
  }
}

// ===== FLAG CHECK =====
function updateFlag() {
  if (flag.reached) return;
  if (rectOverlap(player, flag)) {
    flag.reached = true;
    sfxWin();
    score += 500;
    setTimeout(() => {
      level++;
      if (level >= LEVEL_DATA.length) {
        state = 'WIN';
      } else {
        initLevel(level);
      }
    }, 1000);
  }
}

// ===== DRAW HELPERS =====
function drawPixelText(text, x, y, size=8, color='#4dff4d', shadow=true) {
  ctx.font = `bold ${size}px 'Courier New', monospace`;
  if (shadow) {
    ctx.fillStyle = '#000';
    ctx.fillText(text, x+1, y+1);
  }
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
}

// ===== DRAW TILE =====
function drawTile(t, px, py) {
  const c = TILE_COLORS[t];
  if (!c) return;
  // Body
  ctx.fillStyle = c.body;
  ctx.fillRect(px, py, TILE, TILE);
  // Top highlight
  ctx.fillStyle = c.top;
  ctx.fillRect(px, py, TILE, 4);
  // Left side
  ctx.fillStyle = c.side;
  ctx.fillRect(px, py, 2, TILE);
  // Dark bottom
  ctx.fillStyle = c.side;
  ctx.fillRect(px, py+TILE-2, TILE, 2);
  // Pixel noise
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  for (let i=0;i<3;i++) {
    ctx.fillRect(px+4+i*4, py+6, 2, 2);
    ctx.fillRect(px+2+i*5, py+11, 2, 2);
  }
}

// ===== DRAW FROG =====
function drawFrog(x, y, facing, animFrame, state, superFrog, invincible) {
  const sx = Math.floor(x - camX);
  const sy = Math.floor(y);
  if (invincible > 0 && Math.floor(invincible/4)%2 === 0) return; // blink

  const scale = superFrog ? 1.5 : 1;
  const W = Math.floor(14 * scale);
  const H = Math.floor(16 * scale);
  const ox = facing < 0 ? W : 0;

  ctx.save();
  ctx.translate(sx + (facing < 0 ? W : 0), sy);
  ctx.scale(facing, 1);

  // Squish/stretch based on state
  let sqX = 1, sqY = 1;
  if (state === 'jump') { sqX = 0.85; sqY = 1.15; }
  if (state === 'fall') { sqX = 1.1; sqY = 0.9; }
  ctx.scale(sqX, sqY);

  const bodyColor = superFrog ? '#88ff44' : '#4ddd22';
  const darkGreen = superFrog ? '#44aa22' : '#2a8a10';
  const eyeWhite = '#eeffee';

  // Body
  ctx.fillStyle = bodyColor;
  ctx.fillRect(0, 4, W, H-4);
  // Head
  ctx.fillRect(0, 0, W, 8);
  // Belly lighter
  ctx.fillStyle = '#aaffaa';
  ctx.fillRect(3, 8, W-6, H-10);
  // Dark stripe
  ctx.fillStyle = darkGreen;
  ctx.fillRect(0, 4, 2, H-4);
  ctx.fillRect(W-2, 4, 2, H-4);

  // Eyes
  ctx.fillStyle = eyeWhite;
  ctx.fillRect(2, 1, 4, 4);
  ctx.fillRect(W-6, 1, 4, 4);
  ctx.fillStyle = '#000';
  ctx.fillRect(3, 2, 2, 2);
  ctx.fillRect(W-5, 2, 2, 2);

  // Pupils (look right)
  ctx.fillStyle = '#fff';
  ctx.fillRect(4, 2, 1, 1);
  ctx.fillRect(W-4, 2, 1, 1);

  // Mouth (smile or open)
  ctx.fillStyle = darkGreen;
  if (state === 'idle' || state === 'walk') {
    ctx.fillRect(3, 6, W-6, 1);
    ctx.fillRect(2, 5, 2, 1);
    ctx.fillRect(W-4, 5, 2, 1);
  } else {
    ctx.fillStyle = '#ff6644';
    ctx.fillRect(3, 5, W-6, 3);
    ctx.fillStyle = '#ffaa88';
    ctx.fillRect(4, 6, W-8, 1);
  }

  // Legs (animated walk)
  ctx.fillStyle = darkGreen;
  if (state === 'walk') {
    const kick = animFrame % 2 === 0 ? 2 : -1;
    ctx.fillRect(0, H-4, 5, 4+kick);
    ctx.fillRect(W-5, H-4, 5, 4-kick);
  } else if (state === 'jump') {
    ctx.fillRect(-2, H-2, 6, 3);
    ctx.fillRect(W-4, H-2, 6, 3);
  } else {
    ctx.fillRect(0, H-3, 5, 3);
    ctx.fillRect(W-5, H-3, 5, 3);
  }

  ctx.restore();
}

// ===== DRAW ENEMY =====
function drawEnemy(e) {
  const sx = Math.floor(e.x - camX);
  const sy = Math.floor(e.y);
  if (e.stomped) {
    const flat = e.stompTimer / 20;
    ctx.save();
    ctx.translate(sx + e.w/2, sy + e.h);
    ctx.scale(1.4, flat*0.3);
    ctx.translate(-e.w/2, -e.h);
  } else {
    ctx.save();
    ctx.translate(sx, sy);
  }

  if (e.type === 'bug') {
    // Body (red bug)
    ctx.fillStyle = '#cc2222';
    ctx.fillRect(1, 4, 12, 8);
    // Head
    ctx.fillStyle = '#aa1111';
    ctx.fillRect(2, 1, 10, 5);
    // Shell spots
    ctx.fillStyle = '#220000';
    ctx.fillRect(3, 5, 3, 3);
    ctx.fillRect(8, 5, 3, 3);
    // Antennae
    ctx.fillStyle = '#333';
    const frame = e.animFrame;
    ctx.fillRect(3, 0, 1, frame===0?3:2);
    ctx.fillRect(10, 0, 1, frame===0?2:3);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(3, 2, 2, 2);
    ctx.fillRect(9, 2, 2, 2);
    ctx.fillStyle = '#000';
    ctx.fillRect(4, 2, 1, 1);
    ctx.fillRect(10, 2, 1, 1);
    // Legs
    ctx.fillStyle = '#331111';
    const legY = e.animFrame === 0 ? 10 : 11;
    ctx.fillRect(0, legY, 2, 2);
    ctx.fillRect(5, legY+1, 2, 2);
    ctx.fillRect(12, legY, 2, 2);
  } else if (e.type === 'snake') {
    // Body (green snake)
    ctx.fillStyle = '#228833';
    ctx.fillRect(0, 6, 14, 7);
    // Head
    ctx.fillStyle = '#44aa44';
    ctx.fillRect(2, 3, 10, 6);
    // Scales
    ctx.fillStyle = '#1a6622';
    for (let i=0;i<4;i++) ctx.fillRect(i*4, 8, 3, 2);
    // Eyes
    ctx.fillStyle = '#ffff00';
    ctx.fillRect(3, 4, 2, 2);
    ctx.fillRect(9, 4, 2, 2);
    ctx.fillStyle = '#000';
    ctx.fillRect(4, 4, 1, 1);
    ctx.fillRect(10, 4, 1, 1);
    // Tongue
    const tongOut = e.animFrame === 0;
    if (tongOut) {
      ctx.fillStyle = '#ff2244';
      const dir = e.vx > 0 ? 1 : -1;
      if (dir > 0) { ctx.fillRect(13, 5, 4, 1); ctx.fillRect(15, 4, 1, 1); ctx.fillRect(15, 6, 1, 1); }
      else { ctx.fillRect(-3, 5, 4, 1); ctx.fillRect(-3, 4, 1, 1); ctx.fillRect(-3, 6, 1, 1); }
    }
    // Tail wave
    const wave = e.animFrame === 0 ? 0 : 2;
    ctx.fillStyle = '#228833';
    ctx.fillRect(11, 8+wave, 4, 4);
  }

  ctx.restore();
}

// ===== DRAW FLY =====
function drawFly(f) {
  if (f.collected) return;
  const sx = Math.floor(f.x - camX);
  const sy = Math.floor(f.y + Math.sin(f.bobTimer) * 3);
  // Glow
  ctx.fillStyle = 'rgba(100,255,50,0.15)';
  ctx.beginPath();
  ctx.arc(sx+f.w/2, sy+f.h/2, 8, 0, Math.PI*2);
  ctx.fill();
  // Body (tiny fly)
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(sx+2, sy+2, 4, 5);
  // Eyes
  ctx.fillStyle = '#ff3300';
  ctx.fillRect(sx+1, sy+2, 2, 2);
  ctx.fillRect(sx+5, sy+2, 2, 2);
  // Wings
  const wingFlap = Math.sin(frameCount * 0.4) > 0;
  ctx.fillStyle = 'rgba(200,255,200,0.7)';
  if (wingFlap) {
    ctx.fillRect(sx-2, sy+1, 4, 2);
    ctx.fillRect(sx+6, sy+1, 4, 2);
  } else {
    ctx.fillRect(sx-1, sy+2, 3, 3);
    ctx.fillRect(sx+6, sy+2, 3, 3);
  }
}

// ===== DRAW FLAG =====
function drawFlag(f) {
  const sx = Math.floor(f.x - camX);
  const sy = Math.floor(f.y);
  // Pole
  ctx.fillStyle = '#aaaaaa';
  ctx.fillRect(sx+3, sy, 2, f.h);
  // Flag
  const wave = Math.sin(frameCount * 0.1) * 2;
  ctx.fillStyle = '#ff4422';
  ctx.beginPath();
  ctx.moveTo(sx+5, sy+2);
  ctx.lineTo(sx+5+12+wave, sy+8);
  ctx.lineTo(sx+5, sy+14);
  ctx.fill();
  // "G" on flag
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 7px Courier New';
  ctx.fillText('G', sx+7, sy+12);
}

// ===== DRAW BG =====
function drawBG() {
  const lvl = LEVEL_DATA[level];
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, lvl.bgColor1);
  grad.addColorStop(1, lvl.bgColor2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stars (night levels)
  if (level === 1) {
    ctx.fillStyle = '#ffffff';
    for (let i=0;i<40;i++) {
      const sx = (i * 137 + frameCount * 0.02 * (i%3+1)) % canvas.width;
      const sy = (i * 97) % (canvas.height * 0.6);
      const blink = Math.sin(frameCount * 0.05 + i) > 0.5 ? 1 : 0.5;
      ctx.globalAlpha = blink * 0.7;
      ctx.fillRect(sx, sy, 1, 1);
    }
    ctx.globalAlpha = 1;
  }

  // Parallax hills
  for (const h of lvl.hills) {
    const px = h[0] - camX * 0.3;
    ctx.fillStyle = h[4];
    ctx.beginPath();
    ctx.ellipse(px, h[1], h[2], h[3], 0, Math.PI, 0);
    ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.beginPath();
    ctx.ellipse(px-10, h[1]-5, h[2]*0.5, h[3]*0.4, -0.2, Math.PI, 0);
    ctx.fill();
  }

  // Distant trees
  ctx.fillStyle = 'rgba(20,60,20,0.5)';
  for (let i=0;i<12;i++) {
    const tx = ((i * 200 + 80) - camX * 0.15) % (canvas.width + 60) - 30;
    const th = 40 + (i%3)*10;
    // Trunk
    ctx.fillStyle = 'rgba(40,20,10,0.4)';
    ctx.fillRect(tx+6, canvas.height - th, 5, th);
    // Canopy
    ctx.fillStyle = 'rgba(20,80,20,0.35)';
    ctx.beginPath();
    ctx.arc(tx+8, canvas.height - th - 5, 18 + (i%3)*4, 0, Math.PI*2);
    ctx.fill();
  }
}

// ===== DRAW TILES =====
function drawTiles() {
  const startCol = Math.floor(camX / TILE);
  const endCol = Math.min(mapCols, startCol + Math.ceil(canvas.width / TILE) + 2);

  for (let r = 0; r < mapRows; r++) {
    for (let c = startCol; c < endCol; c++) {
      const t = getTile(c, r);
      if (t === T.AIR) continue;
      const px = c * TILE - Math.floor(camX);
      const py = r * TILE;
      drawTile(t, px, py);
    }
  }
}

// ===== DRAW HUD =====
function drawHUD() {
  // Semi-transparent bar
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, canvas.width, 22);
  ctx.fillStyle = '#4dff4d';
  ctx.fillRect(0, 22, canvas.width, 1);

  drawPixelText(`SCORE:${score}`, 8, 15, 10, '#ffff44');
  drawPixelText(`LIVES:${'♥'.repeat(lives)}`, canvas.width/2 - 35, 15, 10, '#ff6666');
  drawPixelText(`LEVEL:${level+1}`, canvas.width - 65, 15, 10, '#66aaff');
}

// ===== SCREENS =====
function drawStartScreen() {
  ctx.fillStyle = '#0a1a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // Grid bg
  ctx.strokeStyle = 'rgba(77,255,77,0.07)';
  ctx.lineWidth = 1;
  for (let i=0;i<canvas.width;i+=16) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
  for (let i=0;i<canvas.height;i+=16) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

  // Title
  const pulse = 0.85 + Math.sin(frameCount * 0.06) * 0.15;
  ctx.save();
  ctx.translate(canvas.width/2, 80);
  ctx.scale(pulse, pulse);
  drawPixelText('FROG', -60, -10, 40, '#4dff4d');
  drawPixelText('BROS', -46, 30, 40, '#88ff44');
  ctx.restore();

  // Big frog art
  ctx.save();
  ctx.translate(canvas.width/2 - 7, 150);
  drawFrog(-7, 0, 1, Math.floor(frameCount/8)%4, 'idle', false, 0);
  ctx.restore();

  drawPixelText('PRESS ENTER OR TAP TO START', canvas.width/2-108, 210, 9, '#ffff44');
  drawPixelText('ARROW KEYS = MOVE', canvas.width/2-72, 230, 8, '#aaffaa');
  drawPixelText('SPACE / UP = JUMP', canvas.width/2-68, 244, 8, '#aaffaa');
  drawPixelText('P = PAUSE', canvas.width/2-34, 258, 8, '#aaffaa');

  // Scrolling enemy demo at bottom
  const demoX = (frameCount * 1.2) % (canvas.width + 30);
  ctx.save();
  ctx.translate(0, 0);
  drawEnemy({ type:'bug', x: canvas.width - demoX, y: canvas.height - 30, w:14, h:14, vx:-1, stomped:false, animFrame:Math.floor(frameCount/10)%2 });
  drawEnemy({ type:'snake', x: canvas.width - demoX + 80, y: canvas.height - 30, w:14, h:14, vx:-1, stomped:false, animFrame:Math.floor(frameCount/12)%2 });
  ctx.restore();
}

function drawPauseScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawPixelText('PAUSED', canvas.width/2 - 28, canvas.height/2 - 20, 20, '#4dff4d');
  drawPixelText('PRESS P TO RESUME', canvas.width/2 - 72, canvas.height/2 + 10, 9, '#ffff44');
}

function drawGameOverScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawPixelText('GAME OVER', canvas.width/2 - 44, canvas.height/2 - 30, 18, '#ff4444');
  drawPixelText(`FINAL SCORE: ${score}`, canvas.width/2 - 58, canvas.height/2 + 5, 10, '#ffff44');
  drawPixelText('PRESS ENTER TO RETRY', canvas.width/2 - 82, canvas.height/2 + 28, 9, '#aaffaa');
}

function drawWinScreen() {
  ctx.fillStyle = 'rgba(0,30,0,0.9)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const pulse = 0.9 + Math.sin(frameCount * 0.1) * 0.1;
  ctx.save();
  ctx.translate(canvas.width/2, canvas.height/2 - 40);
  ctx.scale(pulse, pulse);
  drawPixelText('YOU WIN!', -36, 0, 22, '#ffff44');
  ctx.restore();
  drawPixelText(`TOTAL SCORE: ${score}`, canvas.width/2 - 60, canvas.height/2 + 10, 11, '#4dff4d');
  drawPixelText('THANKS FOR PLAYING!', canvas.width/2 - 80, canvas.height/2 + 35, 9, '#aaffaa');
  drawPixelText('PRESS ENTER TO PLAY AGAIN', canvas.width/2 - 98, canvas.height/2 + 55, 8, '#88ff44');
}

function drawDeadScreen() {
  ctx.fillStyle = 'rgba(100,0,0,0.4)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  drawPixelText('OUCH!', canvas.width/2 - 22, canvas.height/2, 18, '#ff4444');
  drawPixelText(`LIVES LEFT: ${'♥'.repeat(lives)}`, canvas.width/2 - 60, canvas.height/2 + 28, 10, '#ff9999');
}

// ===== MAIN GAME LOOP =====
function gameLoop() {
  requestAnimationFrame(gameLoop);
  frameCount++;

  // Check global inputs
  if (justPressed('Enter')) {
    if (state === 'START' || state === 'GAMEOVER' || state === 'WIN') {
      score = 0; lives = 3; level = 0;
      initLevel(level);
      state = 'PLAYING';
    }
  }
  if (justPressed('p') || justPressed('P')) {
    if (state === 'PLAYING') state = 'PAUSED';
    else if (state === 'PAUSED') state = 'PLAYING';
  }

  // Update game
  if (state === 'PLAYING') {
    updatePlayer();
    updateEnemies();
    updateFlies();
    updateFlag();
    updateParticles();
    if (shakeTimer > 0) shakeTimer--;
  }

  // Draw
  ctx.save();
  if (shakeTimer > 0) {
    ctx.translate(
      (Math.random()-0.5) * 4,
      (Math.random()-0.5) * 4
    );
  }

  if (state === 'START') {
    drawStartScreen();
  } else {
    drawBG();
    drawTiles();
    drawParticles(camX);
    for (const f of flies) drawFly(f);
    for (const e of enemies) if (e.alive) drawEnemy(e);
    drawFlag(flag);
    // Draw player
    drawFrog(player.x - camX, player.y, player.facing, player.animFrame, player.state, player.superFrog, player.invincible);
    drawHUD();

    if (state === 'PAUSED') drawPauseScreen();
    if (state === 'DEAD')     drawDeadScreen();
    if (state === 'GAMEOVER') drawGameOverScreen();
    if (state === 'WIN')      drawWinScreen();
  }

  ctx.restore();

  // Save prev keys
  for (const k in keys) prevKeys[k] = keys[k];
}

// ===== KICK OFF =====
gameLoop();
</script>
