<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Frog Bridge</title>
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #0a0f0a;
    font-family: 'Press Start 2P', monospace;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  * { -webkit-touch-callout: none; }

  /* ===== GOOGLE FONT ===== */
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  /* ===== HOME BUTTON ===== */
  .btn-home {
    position: fixed; top: 12px; left: 12px; z-index: 999;
    background: rgba(10,30,10,0.85);
    border: 2px solid #3aff6a;
    color: #3aff6a;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 7px 10px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    letter-spacing: 1px;
    transition: none;
    outline: none;
    box-shadow: 0 0 8px #3aff6a55;
  }

  /* ===== CANVAS WRAPPER ===== */
  #gameWrapper {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #gameCanvas {
    display: block;
    image-rendering: pixelated;
    cursor: pointer;
  }
</style>
</head>
<body>

<button class="btn-home" onclick="window.location.href='../index.html'">🏠 Home</button>

<div id="gameWrapper">
  <canvas id="gameCanvas"></canvas>
</div>

<script>
// ============================================================
//  FROG BRIDGE — Single-file HTML5 Canvas Game
//  Inspired by Stick Hero | Dark Swamp / Retro Pixel Theme
// ============================================================

// ── Canvas setup ─────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

// Base design resolution
const BASE_W = 480, BASE_H = 640;
let scale = 1, offsetX = 0, offsetY = 0;

function resizeCanvas() {
  const sw = window.innerWidth, sh = window.innerHeight;
  scale = Math.min(sw / BASE_W, sh / BASE_H);
  canvas.width  = BASE_W;
  canvas.height = BASE_H;
  canvas.style.width  = (BASE_W * scale) + 'px';
  canvas.style.height = (BASE_H * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── Audio (Web Audio API) ─────────────────────────────────────
const AC = window.AudioContext || window.webkitAudioContext;
let ac = null;
function initAudio() { if (!ac) ac = new AC(); }

function beep(freq, dur, type='square', vol=0.15, detune=0) {
  if (!ac) return;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, ac.currentTime);
  o.detune.setValueAtTime(detune, ac.currentTime);
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime + dur);
}

let stretchInterval = null;
function startStretchSound() {
  if (!ac) return;
  stretchInterval = setInterval(() => beep(80 + Math.random()*20, 0.07, 'sawtooth', 0.06), 80);
}
function stopStretchSound() { clearInterval(stretchInterval); stretchInterval = null; }

function soundLand(perfect) {
  if (perfect) {
    beep(880, 0.08, 'square', 0.2);
    setTimeout(() => beep(1100, 0.1, 'square', 0.2), 80);
    setTimeout(() => beep(1320, 0.15, 'square', 0.2), 160);
  } else {
    beep(440, 0.06, 'square', 0.15);
  }
}
function soundFall()  { beep(200, 0.06,'sawtooth',0.2); setTimeout(()=>beep(100,0.2,'sawtooth',0.2),60); }
function soundStep()  { beep(220, 0.04, 'square', 0.08); }
function soundRelease(){ beep(660, 0.07, 'square', 0.15); }

// ── Palette ───────────────────────────────────────────────────
const COL = {
  bg:          '#050d05',
  skyTop:      '#050d05',
  skyBot:      '#0c1f0c',
  fogColor:    '#0e1f0e',
  platform:    '#1a3d1a',
  platEdge:    '#2a6a2a',
  platTop:     '#2ecc40',
  perfect:     '#3aff6a',
  perfectGlow: '#3aff6a66',
  bridge:      '#ff4444',
  bridgeGlow:  '#ff444488',
  frogBody:    '#3aff6a',
  frogDark:    '#1a8f35',
  frogEye:     '#ffffff',
  frogPupil:   '#000000',
  frogMouth:   '#1a8f35',
  score:       '#3aff6a',
  ui:          '#0d2b0d',
  uiBorder:    '#3aff6a',
  particle:    '#3aff6a',
  particleP:   '#ffff44',
  shake:       0,
};

// ── Game state ────────────────────────────────────────────────
const STATE = { MENU:0, PLAYING:1, STRETCHING:2, DROPPING:3, WALKING:4, FALLING:5, DEAD:6 };
let state = STATE.MENU;

let score = 0, highScore = parseInt(localStorage.getItem('fbhs')||'0');
let camX = 0, targetCamX = 0;

// ── Platform ──────────────────────────────────────────────────
class Platform {
  constructor(x, w) {
    this.x = x; this.w = w;
    this.h = 60; // height of platform block
    this.y = BASE_H * 0.62; // top y
  }
  get right() { return this.x + this.w; }
  get left()  { return this.x; }
  perfectZone() {
    const pw = Math.max(12, this.w * 0.28);
    const cx = this.x + this.w/2;
    return { x: cx - pw/2, w: pw };
  }
}

// ── Bridge ────────────────────────────────────────────────────
class Bridge {
  constructor(startX, baseY) {
    this.startX = startX;
    this.baseY  = baseY;
    this.len    = 0;
    this.angle  = -Math.PI/2; // pointing up when growing
    this.fallen = false;
    this.fallProgress = 0; // 0=vertical, 1=horizontal
  }
  get endX() { return this.startX + (this.fallen ? this.len * Math.cos(this.angle + Math.PI/2) : 0); }
  get tipX() {
    if (!this.fallen) return this.startX; // still vertical
    return this.startX + this.len * Math.sin(this.fallProgress * Math.PI/2);
  }
  get tipY() {
    return this.baseY - this.len * Math.cos(this.fallProgress * Math.PI/2);
  }
}

// ── Particle ──────────────────────────────────────────────────
class Particle {
  constructor(x, y, perfect) {
    this.x = x; this.y = y;
    this.vx = (Math.random()-0.5) * 4;
    this.vy = -Math.random() * 4 - 1;
    this.life = 1; this.decay = 0.03 + Math.random()*0.03;
    this.r = Math.random()*3+1;
    this.color = perfect ? COL.particleP : COL.particle;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vy += 0.15; this.life -= this.decay;
  }
}

// ── Game objects ──────────────────────────────────────────────
let platforms = [], bridge = null, particles = [];
let frog = { x:0, y:0, walkProgress:0, fallProgress:0, legPhase:0 };
let shakeX = 0, shakeY = 0, shakeTime = 0;
let difficulty = 0; // 0..1 increases over time

// ── Difficulty helpers ────────────────────────────────────────
function gapMin()   { return 80  + difficulty * 80; }
function gapMax()   { return 130 + difficulty * 120; }
function platMin()  { return Math.max(20, 60 - difficulty * 35); }
function platMax()  { return 90  - difficulty * 20; }

// ── Init / Reset ──────────────────────────────────────────────
function init() {
  score = 0; difficulty = 0; camX = 0; targetCamX = 0;
  particles = []; bridge = null;
  shakeTime = 0;

  // First platform (wide, starts at left)
  const p0 = new Platform(30, 100);
  // Second platform
  const gap = 110;
  const p1w = 70;
  const p1  = new Platform(p0.right + gap, p1w);

  platforms = [p0, p1];

  // Frog sits on right edge of first platform
  frog.x = p0.right - 18;
  frog.y = p0.y;
  frog.walkProgress = 0;
  frog.fallProgress = 0;
  frog.legPhase = 0;

  state = STATE.PLAYING;
}

// ── Spawn next platform ───────────────────────────────────────
function spawnNextPlatform() {
  const last = platforms[platforms.length-1];
  const gap  = gapMin() + Math.random() * (gapMax() - gapMin());
  const w    = platMin() + Math.random() * (platMax() - platMin());
  platforms.push(new Platform(last.right + gap, w));
}

// ── Bridge drop check ─────────────────────────────────────────
function checkBridgeLand() {
  const cur = platforms[platforms.length - 2]; // current standing platform
  const nxt = platforms[platforms.length - 1]; // next platform
  const tipX = bridge.startX + bridge.len; // where bridge tip lands

  // Check if tip lands on next platform
  if (tipX >= nxt.left && tipX <= nxt.right) {
    // Success
    const pz = nxt.perfectZone();
    const perfect = tipX >= pz.x && tipX <= pz.x + pz.w;
    return { success: true, perfect };
  }
  return { success: false, perfect: false };
}

// ── Walk frog across bridge ───────────────────────────────────
let walkResult = null;
function startWalk(result) {
  walkResult = result;
  // After spawnNextPlatform(), the platform we're walking TO is now platforms.length-2
  // (the newly spawned one is the last)
  const nxt = platforms[platforms.length - 2];
  frog.walkStart = frog.x;
  frog.walkEnd   = nxt.right - 18;
  frog.walkProgress = 0;
  state = STATE.WALKING;
}

// ── Screen shake ──────────────────────────────────────────────
function triggerShake() {
  shakeTime = 18;
}

// ── Particles ─────────────────────────────────────────────────
function spawnParticles(x, y, perfect) {
  for (let i=0; i<(perfect?16:8); i++) {
    particles.push(new Particle(x, y, perfect));
  }
}

// ── Background layers ─────────────────────────────────────────
// Pre-build some bg elements
const bgTrees = [];
for (let i=0; i<40; i++) {
  bgTrees.push({
    x: Math.random() * 3000 - 500,
    h: 60 + Math.random()*80,
    w: 8 + Math.random()*14,
    layer: Math.floor(Math.random()*3), // 0=far,1=mid,2=near
  });
}
const bgLilies = [];
for (let i=0; i<20; i++) {
  bgLilies.push({ x: Math.random()*3000-200, y: BASE_H*0.62+8+Math.random()*30, r: 3+Math.random()*5 });
}

// ── Drawing helpers ───────────────────────────────────────────
function drawPlatform(p, cx) {
  const rx = p.x - cx;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(rx+4, p.y+6, p.w, p.h);

  // Body
  ctx.fillStyle = COL.platform;
  ctx.fillRect(rx, p.y, p.w, p.h);

  // Edge highlight
  ctx.fillStyle = COL.platEdge;
  ctx.fillRect(rx, p.y, p.w, 3);
  ctx.fillRect(rx, p.y, 3, p.h);

  // Top green strip
  ctx.fillStyle = COL.platTop;
  ctx.fillRect(rx+2, p.y, p.w-4, 5);

  // Perfect zone
  const pz = p.perfectZone();
  ctx.fillStyle = COL.perfectGlow;
  ctx.fillRect(rx + pz.x - p.x, p.y, pz.w, 5);
  ctx.fillStyle = COL.perfect;
  ctx.fillRect(rx + pz.x - p.x + pz.w/2 - 1, p.y, 2, 5);

  // Moss dots
  ctx.fillStyle = '#1f5c1f';
  for (let i=0; i<Math.floor(p.w/10); i++) {
    ctx.fillRect(rx+5+i*10, p.y+5, 3, 2);
  }
}

function drawBridge(cx) {
  if (!bridge) return;
  const bx = bridge.startX - cx;
  const by = bridge.baseY;

  ctx.save();
  ctx.strokeStyle = COL.bridge;
  ctx.lineWidth   = 5;
  ctx.lineCap     = 'round';
  ctx.shadowColor = COL.bridgeGlow;
  ctx.shadowBlur  = 10;

  if (!bridge.fallen) {
    // Growing vertically upward
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.lineTo(bx, by - bridge.len);
    ctx.stroke();

    // Pixel dots along tongue
    ctx.fillStyle = '#ff6666';
    for (let i=8; i<bridge.len; i+=12) {
      ctx.fillRect(bx-2, by-i-2, 4, 4);
    }
  } else {
    // Falling/fallen: rotate from vertical to horizontal
    ctx.translate(bx, by);
    ctx.rotate(bridge.fallProgress * Math.PI/2);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -bridge.len);
    ctx.stroke();

    // Pixel dots
    ctx.fillStyle = '#ff6666';
    for (let i=8; i<bridge.len; i+=12) {
      ctx.fillRect(-2, -i-2, 4, 4);
    }
  }
  ctx.restore();
}

function drawFrog(fx, fy, walkPhase, fallAnim) {
  const x = fx, y = fy - 28;
  ctx.save();

  if (fallAnim > 0) {
    ctx.translate(fx, fy - 28 + fallAnim * 40);
    ctx.rotate(fallAnim * Math.PI * 1.2);
    drawFrogBody(0, 0, walkPhase);
  } else {
    drawFrogBody(fx, fy - 28, walkPhase);
  }
  ctx.restore();
}

function drawFrogBody(x, y, walkPhase) {
  // Legs (back)
  const legOff = Math.sin(walkPhase) * 4;
  ctx.fillStyle = COL.frogDark;
  // back left leg
  ctx.fillRect(x-10, y+18+legOff, 8, 5);
  ctx.fillRect(x-14, y+22+legOff, 10, 4);
  // back right leg
  ctx.fillRect(x+6, y+18-legOff, 8, 5);
  ctx.fillRect(x+8, y+22-legOff, 10, 4);

  // Body
  ctx.fillStyle = COL.frogBody;
  ctx.fillRect(x-12, y+4, 28, 22);

  // Head
  ctx.fillRect(x-10, y-8, 24, 18);

  // Darker belly stripe
  ctx.fillStyle = COL.frogDark;
  ctx.fillRect(x-6, y+12, 16, 8);

  // Eyes (white)
  ctx.fillStyle = COL.frogEye;
  ctx.fillRect(x-8, y-8, 8, 8);
  ctx.fillRect(x+4, y-8, 8, 8);

  // Pupils
  ctx.fillStyle = COL.frogPupil;
  ctx.fillRect(x-6, y-6, 4, 4);
  ctx.fillRect(x+6, y-6, 4, 4);

  // Mouth
  ctx.fillStyle = COL.frogMouth;
  ctx.fillRect(x-4, y+2, 12, 3);

  // Front legs
  const flegOff = Math.sin(walkPhase + Math.PI) * 3;
  ctx.fillStyle = COL.frogDark;
  ctx.fillRect(x-14, y+10+flegOff, 6, 4);
  ctx.fillRect(x+12, y+10-flegOff, 6, 4);
}

function drawBackground(cx) {
  // Sky gradient
  const grad = ctx.createLinearGradient(0,0,0,BASE_H*0.62);
  grad.addColorStop(0, '#020802');
  grad.addColorStop(1, '#0c1f0c');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, BASE_W, BASE_H*0.62);

  // Stars
  ctx.fillStyle = 'rgba(180,255,180,0.6)';
  for (let i=0; i<30; i++) {
    const sx = ((i*137 + cx*0.02) % BASE_W);
    const sy = (i*97) % (BASE_H*0.4);
    const ss = (i%3===0) ? 2 : 1;
    ctx.fillRect(sx, sy, ss, ss);
  }

  // Far trees (parallax layer 0)
  ctx.fillStyle = '#0a1a0a';
  bgTrees.filter(t=>t.layer===0).forEach(t => {
    const tx = t.x - cx * 0.2;
    const drawX = ((tx % BASE_W) + BASE_W) % BASE_W;
    ctx.fillRect(drawX - t.w/2, BASE_H*0.62 - t.h, t.w, t.h);
    ctx.fillRect(drawX - t.w*0.8, BASE_H*0.62 - t.h*0.7, t.w*1.6, t.h*0.4);
  });

  // Mid trees (parallax layer 1)
  ctx.fillStyle = '#0d200d';
  bgTrees.filter(t=>t.layer===1).forEach(t => {
    const tx = t.x - cx * 0.5;
    const drawX = ((tx % (BASE_W+200) + (BASE_W+200)) % (BASE_W+200)) - 100;
    ctx.fillRect(drawX - t.w/2, BASE_H*0.62 - t.h, t.w, t.h);
    ctx.fillRect(drawX - t.w, BASE_H*0.62 - t.h*0.6, t.w*2, t.h*0.35);
  });

  // Fog band
  const fogGrad = ctx.createLinearGradient(0, BASE_H*0.52, 0, BASE_H*0.62);
  fogGrad.addColorStop(0, 'rgba(14,31,14,0)');
  fogGrad.addColorStop(1, 'rgba(14,31,14,0.7)');
  ctx.fillStyle = fogGrad;
  ctx.fillRect(0, BASE_H*0.52, BASE_W, BASE_H*0.1);

  // Swamp water (below platforms)
  const waterGrad = ctx.createLinearGradient(0, BASE_H*0.62, 0, BASE_H);
  waterGrad.addColorStop(0, '#061206');
  waterGrad.addColorStop(1, '#030803');
  ctx.fillStyle = waterGrad;
  ctx.fillRect(0, BASE_H*0.62, BASE_W, BASE_H*0.38);

  // Water shimmer
  ctx.fillStyle = 'rgba(58,255,106,0.05)';
  for (let i=0; i<8; i++) {
    const wx = ((i*80 - cx*0.8) % BASE_W + BASE_W) % BASE_W;
    ctx.fillRect(wx, BASE_H*0.63, 30+i*5, 2);
  }

  // Near trees (layer 2) — silhouette in front
  ctx.fillStyle = '#060e06';
  bgTrees.filter(t=>t.layer===2).forEach(t => {
    const tx = t.x - cx * 0.85;
    const drawX = ((tx % (BASE_W+300) + (BASE_W+300)) % (BASE_W+300)) - 150;
    ctx.fillRect(drawX - t.w/2, BASE_H*0.62 - t.h, t.w, t.h);
    ctx.fillRect(drawX - t.w*1.1, BASE_H*0.62 - t.h*0.55, t.w*2.2, t.h*0.3);
  });

  // Lily pads
  ctx.fillStyle = '#0f2a0f';
  bgLilies.forEach(l => {
    const lx = ((l.x - cx * 0.9) % (BASE_W+200) + (BASE_W+200)) % (BASE_W+200) - 100;
    ctx.beginPath();
    ctx.ellipse(lx, l.y, l.r*2, l.r, 0, 0, Math.PI*2);
    ctx.fill();
  });
}

function drawHUD() {
  // Score
  ctx.fillStyle = COL.score;
  ctx.font = '14px "Press Start 2P"';
  ctx.shadowColor = '#3aff6a';
  ctx.shadowBlur  = 8;
  ctx.fillText(score, BASE_W/2 - ctx.measureText(score).width/2, 40);

  ctx.font = '8px "Press Start 2P"';
  ctx.shadowBlur = 4;
  const hsText = 'BEST ' + highScore;
  ctx.fillText(hsText, BASE_W/2 - ctx.measureText(hsText).width/2, 58);
  ctx.shadowBlur = 0;
}

function drawMenu() {
  ctx.fillStyle = 'rgba(5,13,5,0.85)';
  ctx.fillRect(0, 0, BASE_W, BASE_H);

  // Title
  ctx.shadowColor = '#3aff6a'; ctx.shadowBlur = 20;
  ctx.fillStyle = '#3aff6a';
  ctx.font = '22px "Press Start 2P"';
  ctx.fillText('FROG', BASE_W/2 - ctx.measureText('FROG').width/2, BASE_H*0.32);
  ctx.fillText('BRIDGE', BASE_W/2 - ctx.measureText('BRIDGE').width/2, BASE_H*0.32+32);
  ctx.shadowBlur = 0;

  // Frog deco
  drawFrogBody(BASE_W/2, BASE_H*0.5, Math.sin(Date.now()/300)*2);

  ctx.fillStyle = '#5aff8a';
  ctx.font = '7px "Press Start 2P"';
  const sub = 'HOLD TO STRETCH  RELEASE TO DROP';
  ctx.fillText(sub, BASE_W/2 - ctx.measureText(sub).width/2, BASE_H*0.65);

  ctx.fillStyle = '#3aff6a';
  ctx.font = '8px "Press Start 2P"';
  const tap = '[ TAP TO START ]';
  const blink = Math.sin(Date.now()/400) > 0;
  if (blink) ctx.fillText(tap, BASE_W/2 - ctx.measureText(tap).width/2, BASE_H*0.76);

  ctx.fillStyle = '#2a7a2a';
  ctx.font = '6px "Press Start 2P"';
  const hs = 'BEST: ' + highScore;
  ctx.fillText(hs, BASE_W/2 - ctx.measureText(hs).width/2, BASE_H*0.84);
}

function drawDead() {
  ctx.fillStyle = 'rgba(5,13,5,0.8)';
  ctx.fillRect(0, 0, BASE_W, BASE_H);

  ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 20;
  ctx.fillStyle = '#ff4444';
  ctx.font = '14px "Press Start 2P"';
  ctx.fillText('GAME OVER', BASE_W/2 - ctx.measureText('GAME OVER').width/2, BASE_H*0.38);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#3aff6a';
  ctx.font = '10px "Press Start 2P"';
  ctx.fillText('SCORE: '+score, BASE_W/2 - ctx.measureText('SCORE: '+score).width/2, BASE_H*0.50);

  ctx.fillStyle = '#5aff8a';
  ctx.font = '8px "Press Start 2P"';
  ctx.fillText('BEST: '+highScore, BASE_W/2 - ctx.measureText('BEST: '+highScore).width/2, BASE_H*0.59);

  ctx.fillStyle = '#3aff6a';
  ctx.font = '7px "Press Start 2P"';
  const tap = '[ TAP TO RESTART ]';
  const blink = Math.sin(Date.now()/400) > 0;
  if (blink) ctx.fillText(tap, BASE_W/2 - ctx.measureText(tap).width/2, BASE_H*0.72);
}

// ── Pause ─────────────────────────────────────────────────────
let paused = false;
function drawPause() {
  ctx.fillStyle = 'rgba(5,13,5,0.7)';
  ctx.fillRect(0, 0, BASE_W, BASE_H);
  ctx.fillStyle = '#3aff6a';
  ctx.font = '16px "Press Start 2P"';
  ctx.fillText('PAUSED', BASE_W/2 - ctx.measureText('PAUSED').width/2, BASE_H/2);
  ctx.font = '7px "Press Start 2P"';
  ctx.fillText('P TO RESUME', BASE_W/2 - ctx.measureText('P TO RESUME').width/2, BASE_H/2+24);
}

// ── Perfect flash ─────────────────────────────────────────────
let perfectFlash = 0;
function drawPerfectFlash() {
  if (perfectFlash <= 0) return;
  ctx.save();
  ctx.globalAlpha = perfectFlash;
  ctx.fillStyle = '#ffff44';
  ctx.font = '12px "Press Start 2P"';
  const t = 'PERFECT!';
  ctx.fillText(t, BASE_W/2 - ctx.measureText(t).width/2, BASE_H*0.55);
  ctx.restore();
  perfectFlash -= 0.03;
}

// ── Main update ───────────────────────────────────────────────
const BRIDGE_SPEED  = 120; // px/sec
const FALL_SPEED    = 2.2; // fall rotation speed
const WALK_SPEED    = 160; // px/sec

let lastTime = 0;

function update(dt) {
  if (paused) return;

  // Difficulty ramp
  difficulty = Math.min(1, score * 0.022);

  // Shake decay
  if (shakeTime > 0) {
    shakeTime--;
    shakeX = (Math.random()-0.5)*8*(shakeTime/18);
    shakeY = (Math.random()-0.5)*6*(shakeTime/18);
  } else { shakeX=0; shakeY=0; }

  // Particles
  particles.forEach(p=>p.update());
  particles = particles.filter(p=>p.life>0);

  // Camera smooth follow
  camX += (targetCamX - camX) * 0.08;

  // Perfect flash
  // (handled in draw)

  if (state === STATE.STRETCHING) {
    bridge.len += BRIDGE_SPEED * dt;
    if (bridge.len > BASE_W * 1.2) bridge.len = BASE_W * 1.2; // cap
  }

  if (state === STATE.DROPPING) {
    bridge.fallProgress += FALL_SPEED * dt;
    if (bridge.fallProgress >= 1) {
      bridge.fallProgress = 1;
      bridge.fallen = true;
      // Check landing
      const res = checkBridgeLand();
      if (res.success) {
        soundLand(res.perfect);
        score++;
        if (score > highScore) { highScore = score; localStorage.setItem('fbhs', highScore); }
        difficulty = Math.min(1, score * 0.022);
        if (res.perfect) { perfectFlash = 1.0; spawnParticles(bridge.startX + bridge.len - camX, platforms[platforms.length-1].y, true); score++; }
        else { spawnParticles(bridge.startX + bridge.len - camX, platforms[platforms.length-1].y, false); }
        spawnNextPlatform();
        // Target camera: show the platform we're walking TO (now platforms[-2] after spawn)
        const nxt2 = platforms[platforms.length - 2];
        targetCamX = nxt2.x - 60;
        startWalk(res);
      } else {
        // Fail
        soundFall();
        triggerShake();
        state = STATE.FALLING;
        frog.fallProgress = 0;
      }
    }
  }

  if (state === STATE.WALKING) {
    const speed = WALK_SPEED * dt;
    frog.x += speed;
    frog.legPhase += 12 * dt;
    if (Math.floor(frog.legPhase * 3) % 3 === 0) soundStep();
    const t = (frog.x - frog.walkStart) / (frog.walkEnd - frog.walkStart);
    if (t >= 1) {
      frog.x = frog.walkEnd;
      // Remove oldest platform if we have > 3
      if (platforms.length > 3) {
        platforms.shift();
      }
      // Advance camera
      const cur2 = platforms[platforms.length-2];
      targetCamX = cur2.right - 80;
      state = STATE.PLAYING;
    }
  }

  if (state === STATE.FALLING) {
    frog.fallProgress += 2.5 * dt;
    if (frog.fallProgress >= 1) {
      // Died
      state = STATE.DEAD;
    }
  }
}

// ── Main draw ─────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, BASE_W, BASE_H);

  if (state === STATE.MENU) {
    drawBackground(0);
    drawMenu();
    return;
  }

  // Apply shake
  ctx.save();
  ctx.translate(shakeX, shakeY);

  const cx = Math.round(camX);

  drawBackground(cx);

  // Platforms
  platforms.forEach(p => drawPlatform(p, cx));

  // Bridge
  if (bridge) {
    ctx.save();
    const bx = bridge.startX - cx;
    const by = bridge.baseY;
    ctx.strokeStyle = COL.bridge;
    ctx.lineWidth = 5; ctx.lineCap = 'round';
    ctx.shadowColor = COL.bridgeGlow; ctx.shadowBlur = 10;

    if (!bridge.fallen) {
      ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx, by - bridge.len); ctx.stroke();
      ctx.fillStyle = '#ff6666';
      for (let i=8; i<bridge.len; i+=12) ctx.fillRect(bx-2, by-i-2, 4, 4);
    } else {
      ctx.save();
      ctx.translate(bx, by);
      ctx.rotate(bridge.fallProgress * Math.PI/2);
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-bridge.len); ctx.stroke();
      ctx.fillStyle = '#ff6666';
      for (let i=8; i<bridge.len; i+=12) ctx.fillRect(-2,-i-2,4,4);
      ctx.restore();
    }
    ctx.restore();
  }

  // Frog
  const fx = frog.x - cx;
  if (state === STATE.FALLING) {
    ctx.save();
    const fp = frog.fallProgress;
    ctx.translate(fx + fp*20, frog.y-28 + fp*180);
    ctx.rotate(fp * Math.PI * 1.5);
    ctx.globalAlpha = Math.max(0, 1 - fp);
    drawFrogBody(0, 0, frog.legPhase);
    ctx.restore();
  } else {
    drawFrogBody(fx, frog.y-28, state===STATE.WALKING ? frog.legPhase : 0);
  }

  // Particles (in world space)
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color; ctx.shadowBlur = 6;
    ctx.fillRect(p.x-p.r, p.y-p.r, p.r*2, p.r*2);
    ctx.restore();
  });

  ctx.restore(); // end shake

  drawHUD();
  drawPerfectFlash();

  if (state === STATE.DEAD) drawDead();
  if (paused) drawPause();
}

// ── Game loop ─────────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });

// ── Input ─────────────────────────────────────────────────────
let holding = false;

function onPress() {
  initAudio();
  if (state === STATE.MENU) { init(); return; }
  if (state === STATE.DEAD) { init(); return; }
  if (paused) return;
  if (state === STATE.PLAYING) {
    const cur = platforms[platforms.length - 2];
    bridge = new Bridge(cur.right, cur.y);
    state = STATE.STRETCHING;
    startStretchSound();
    holding = true;
  }
}

function onRelease() {
  if (!holding) return;
  holding = false;
  stopStretchSound();
  if (state === STATE.STRETCHING) {
    soundRelease();
    bridge.fallen = false;
    state = STATE.DROPPING;
  }
}

// Mouse
canvas.addEventListener('mousedown', e => { e.preventDefault(); onPress(); });
canvas.addEventListener('mouseup',   e => { e.preventDefault(); onRelease(); });

// Touch
canvas.addEventListener('touchstart', e => { e.preventDefault(); onPress(); }, {passive:false});
canvas.addEventListener('touchend',   e => { e.preventDefault(); onRelease(); }, {passive:false});
canvas.addEventListener('touchcancel',e => { e.preventDefault(); onRelease(); }, {passive:false});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (state === STATE.MENU || state === STATE.DEAD) { initAudio(); init(); }
    else onPress();
  }
  if (e.key === 'p' || e.key === 'P') {
    if (state !== STATE.MENU && state !== STATE.DEAD) paused = !paused;
  }
});
document.addEventListener('keyup', e => {
  if (e.key === 'Enter') onRelease();
});

// Block context menu, page scroll
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('touchmove',   e => e.preventDefault(), {passive:false});
document.addEventListener('selectstart', e => e.preventDefault());

</script>
